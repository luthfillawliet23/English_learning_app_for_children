<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Family Slider</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #FAF9F6;
    color: #2C2C2A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    -webkit-user-select: none;
    user-select: none;
  }
  .topbar {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .stars {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .star-icon { font-size: 22px; }
  #newFamilyBtn {
    background: #FFFFFF;
    border: 1px solid #D3D1C7;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    font-weight: 500;
    color: #2C2C2A;
  }
  #newFamilyBtn:active { background: #F1EFE8; }
  .game-card {
    width: 100%;
    max-width: 600px;
    background: #FFFFFF;
    border-radius: 20px;
    border: 1px solid #E5E3DA;
    padding: 48px 20px;
    text-align: center;
  }
  .slider-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .arrow-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #F1EFE8;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #534AB7;
  }
  .arrow-btn:active { background: #D3D1C7; }
  #letterBox {
    width: 130px;
    height: 130px;
    background: #EEEDFE;
    border: 2px solid #AFA9EC;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 68px;
    font-weight: 700;
    color: #26215C;
    margin: 0 16px;
    touch-action: none;
  }
  #rimeBox {
    font-size: 68px;
    font-weight: 700;
    color: #888780;
  }
  .feedback {
    min-height: 70px;
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wordReveal {
    font-size: 28px;
    font-weight: 700;
    color: #0F6E56;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .found-section {
    width: 100%;
    max-width: 600px;
    margin-top: 24px;
  }
  .found-label {
    font-size: 14px;
    color: #5F5E5A;
    margin-bottom: 10px;
  }
  #chipRow {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
  }
  .chip {
    background: #E1F5EE;
    color: #085041;
    font-size: 15px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .hint {
    max-width: 600px;
    font-size: 14px;
    color: #888780;
    text-align: center;
    margin-top: 20px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="stars"><span class="star-icon">&#9733;</span><span id="starCount">0</span><span style="font-size:14px;color:#5F5E5A;font-weight:400;">words found</span></div>
  <button id="newFamilyBtn">New family &#8594;</button>
</div>

<div class="game-card">
  <div class="slider-row">
    <button class="arrow-btn" id="upBtn" aria-label="Previous letter">&#9650;</button>
    <div id="letterBox">c</div>
    <div id="rimeBox">at</div>
    <button class="arrow-btn" id="downBtn" aria-label="Next letter">&#9660;</button>
  </div>
  <div class="feedback">
    <span id="wordReveal"></span>
  </div>
</div>

<div class="found-section">
  <p class="found-label">Words found in this family</p>
  <div id="chipRow"></div>
</div>

<p class="hint">Tap the arrows or drag the letter up and down to find real words</p>

<script>
const families = [
  { rime: "at", letters: ["c","b","h","m","s","r","d","g"], real: ["cat","bat","hat","mat","sat","rat"] },
  { rime: "an", letters: ["c","m","p","v","r","t","f","d"], real: ["can","man","pan","van","ran","tan","fan"] },
  { rime: "ig", letters: ["b","d","f","p","w","j","q","k"], real: ["big","dig","fig","pig","wig","jig"] },
  { rime: "og", letters: ["d","f","h","j","l","b","c","w"], real: ["dog","fog","hog","jog","log","bog","cog"] },
  { rime: "ug", letters: ["b","h","j","m","r","t","d","f"], real: ["bug","hug","jug","mug","rug","tug","dug"] }
];

let familyIndex = 0;
let letterIndex = 0;
let found = new Set();
let totalStars = 0;

const letterBox = document.getElementById("letterBox");
const rimeBox = document.getElementById("rimeBox");
const wordReveal = document.getElementById("wordReveal");
const chipRow = document.getElementById("chipRow");
const starCount = document.getElementById("starCount");

function currentFamily() { return families[familyIndex]; }

function render() {
  const fam = currentFamily();
  letterBox.textContent = fam.letters[letterIndex];
  rimeBox.textContent = fam.rime;
  chipRow.innerHTML = "";
  found.forEach(function(w) {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = w;
    chipRow.appendChild(chip);
  });
  starCount.textContent = totalStars;
}

function checkWord(speak) {
  const fam = currentFamily();
  const word = fam.letters[letterIndex] + fam.rime;
  if (fam.real.indexOf(word) !== -1 && !found.has(word)) {
    found.add(word);
    totalStars++;
    wordReveal.textContent = word;
    wordReveal.style.opacity = "1";
    letterBox.style.transform = "scale(1.15)";
    letterBox.style.transition = "transform 0.25s";
    setTimeout(function() { letterBox.style.transform = "scale(1)"; }, 250);
    if (speak) {
      try {
        const utter = new SpeechSynthesisUtterance(word);
        utter.rate = 0.8;
        utter.pitch = 1.1;
        window.speechSynthesis.speak(utter);
      } catch(e) {}
    }
    render();
    setTimeout(function() { wordReveal.style.opacity = "0"; }, 1800);
  }
}

function changeLetter(delta) {
  const fam = currentFamily();
  letterIndex = (letterIndex + delta + fam.letters.length) % fam.letters.length;
  render();
  checkWord(true);
}

document.getElementById("upBtn").addEventListener("click", function() { changeLetter(-1); });
document.getElementById("downBtn").addEventListener("click", function() { changeLetter(1); });

document.getElementById("newFamilyBtn").addEventListener("click", function() {
  familyIndex = (familyIndex + 1) % families.length;
  letterIndex = 0;
  found = new Set();
  render();
  checkWord(false);
});

let dragStartY = null;
letterBox.addEventListener("pointerdown", function(e) {
  dragStartY = e.clientY;
  letterBox.setPointerCapture(e.pointerId);
});
letterBox.addEventListener("pointermove", function(e) {
  if (dragStartY === null) return;
  const step = 32;
  if (e.clientY - dragStartY > step) { changeLetter(1); dragStartY = e.clientY; }
  else if (e.clientY - dragStartY < -step) { changeLetter(-1); dragStartY = e.clientY; }
});
letterBox.addEventListener("pointerup", function() { dragStartY = null; });
letterBox.addEventListener("pointercancel", function() { dragStartY = null; });

render();
checkWord(false);
</script>

</body>
</html>

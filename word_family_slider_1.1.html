<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Family Slider</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #FAF9F6;
    color: #2C2C2A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    -webkit-user-select: none;
    user-select: none;
  }
  .topbar {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .stars {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .star-icon { font-size: 22px; }
  #newFamilyBtn {
    background: #FFFFFF;
    border: 1px solid #D3D1C7;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    font-weight: 500;
    color: #2C2C2A;
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
  }
  #newFamilyBtn:active { background: #F1EFE8; }
  .game-card {
    width: 100%;
    max-width: 600px;
    background: #FFFFFF;
    border-radius: 20px;
    border: 1px solid #E5E3DA;
    padding: 48px 20px;
    text-align: center;
  }
  .slider-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .arrow-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #F1EFE8;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #534AB7;
    touch-action: manipulation;
    -webkit-appearance: none;
    appearance: none;
  }
  .arrow-btn:active { background: #D3D1C7; }
  #letterBox {
    width: 130px;
    height: 130px;
    background: #EEEDFE;
    border: 2px solid #AFA9EC;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 68px;
    font-weight: 700;
    color: #26215C;
    margin: 0 16px;
    touch-action: none;
  }
  #rimeBox {
    font-size: 68px;
    font-weight: 700;
    color: #888780;
  }
  .feedback {
    min-height: 150px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wordRevealWrap {
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.25s, transform 0.25s;
  }
  #wordImage {
    width: 96px;
    height: 96px;
    margin: 0 auto 8px;
  }
  #wordImage svg { width: 100%; height: 100%; display: block; }
  #wordReveal {
    display: block;
    font-size: 28px;
    font-weight: 700;
    color: #0F6E56;
  }
  .found-section {
    width: 100%;
    max-width: 600px;
    margin-top: 24px;
  }
  .found-label {
    font-size: 14px;
    color: #5F5E5A;
    margin-bottom: 10px;
  }
  #chipRow {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
  }
  .chip {
    background: #E1F5EE;
    color: #085041;
    font-size: 15px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
  }
  .hint {
    max-width: 600px;
    font-size: 14px;
    color: #888780;
    text-align: center;
    margin-top: 20px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="stars"><span class="star-icon">&#9733;</span><span id="starCount">0</span><span style="font-size:14px;color:#5F5E5A;font-weight:400;">words found</span></div>
  <button id="newFamilyBtn">New family &#8594;</button>
</div>

<div class="game-card">
  <div class="slider-row">
    <button class="arrow-btn" id="upBtn" aria-label="Previous letter">&#9650;</button>
    <div id="letterBox">c</div>
    <div id="rimeBox">at</div>
    <button class="arrow-btn" id="downBtn" aria-label="Next letter">&#9660;</button>
  </div>
  <div class="feedback">
    <div id="wordRevealWrap">
      <div id="wordImage"></div>
      <span id="wordReveal"></span>
    </div>
  </div>
</div>

<div class="found-section">
  <p class="found-label">Words found in this family</p>
  <div id="chipRow"></div>
</div>

<p class="hint">Tap the arrows or drag the letter up and down to find real words</p>

  hog: '<svg viewBox="0 0 100 100"><ellipse cx="50" cy="58" rx="34" ry="26" fill="#F0997B"/><polygon points="22,42 12,26 32,34" fill="#F0997B"/><polygon points="78,42 88,26 68,34" fill="#F0997B"/><ellipse cx="50" cy="64" rx="13" ry="10" fill="#D85A30"/><circle cx="45" cy="64" r="2.5" fill="#4A1B0C"/><circle cx="55" cy="64" r="2.5" fill="#4A1B0C"/></svg>',
  jog: '<svg viewBox="0 0 100 100"><circle cx="42" cy="26" r="10" fill="#639922"/><line x1="42" y1="36" x2="52" y2="60" stroke="#3B6D11" stroke-width="7" stroke-linecap="round"/><line x1="46" y1="42" x2="68" y2="32" stroke="#3B6D11" stroke-width="6" stroke-linecap="round"/><line x1="48" y1="50" x2="28" y2="52" stroke="#3B6D11" stroke-width="6" stroke-linecap="round"/><line x1="52" y1="60" x2="72" y2="68" stroke="#3B6D11" stroke-width="6" stroke-linecap="round"/><line x1="52" y1="60" x2="38" y2="84" stroke="#3B6D11" stroke-width="6" stroke-linecap="round"/></svg>',

};
const fallbackIcon = '<svg viewBox="0 0 100 100"><polygon points="50,10 58,40 88,40 64,58 72,88 50,70 28,88 36,58 12,40 42,40" fill="#EF9F27"/></svg>';

let familyIndex = 0;
let letterIndex = 0;
let found = new Set();
let totalStars = 0;

const letterBox = document.getElementById("letterBox");
const rimeBox = document.getElementById("rimeBox");
const wordRevealWrap = document.getElementById("wordRevealWrap");
const wordReveal = document.getElementById("wordReveal");
const wordImage = document.getElementById("wordImage");
const chipRow = document.getElementById("chipRow");
const starCount = document.getElementById("starCount");

function currentFamily() { return families[familyIndex]; }

function render() {
  const fam = currentFamily();
  letterBox.textContent = fam.letters[letterIndex];
  rimeBox.textContent = fam.rime;
  chipRow.innerHTML = "";
  found.forEach(function(w) {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = w;
    chipRow.appendChild(chip);
  });
  starCount.textContent = totalStars;
}

function checkWord(speak) {
  const fam = currentFamily();
  const word = fam.letters[letterIndex] + fam.rime;
  if (fam.real.indexOf(word) !== -1 && !found.has(word)) {
    found.add(word);
    totalStars++;
    wordReveal.textContent = word;
    wordImage.innerHTML = icons[word] || fallbackIcon;
    wordRevealWrap.style.opacity = "1";
    wordRevealWrap.style.transform = "scale(1)";
    letterBox.style.transform = "scale(1.15)";
    letterBox.style.transition = "transform 0.25s";
    setTimeout(function() { letterBox.style.transform = "scale(1)"; }, 250);
    if (speak) {
      try {
        const utter = new SpeechSynthesisUtterance(word);
        utter.rate = 0.8;
        utter.pitch = 1.1;
        window.speechSynthesis.speak(utter);
      } catch(e) {}
    }
    render();
    setTimeout(function() {
      wordRevealWrap.style.opacity = "0";
      wordRevealWrap.style.transform = "scale(0.85)";
    }, 2200);
  }
}

function changeLetter(delta) {
  const fam = currentFamily();
  letterIndex = (letterIndex + delta + fam.letters.length) % fam.letters.length;
  render();
  checkWord(true);
}

function addTapListener(el, handler) {
  let handled = false;
  el.addEventListener("touchend", function(e) {
    e.preventDefault();
    handled = true;
    handler();
    setTimeout(function() { handled = false; }, 350);
  }, { passive: false });
  el.addEventListener("click", function(e) {
    if (handled) { return; }
    handler();
  });
}

addTapListener(document.getElementById("upBtn"), function() { changeLetter(-1); });
addTapListener(document.getElementById("downBtn"), function() { changeLetter(1); });
addTapListener(document.getElementById("newFamilyBtn"), function() {
  familyIndex = (familyIndex + 1) % families.length;
  letterIndex = 0;
  found = new Set();
  render();
  checkWord(false);
});

let dragStartY = null;
letterBox.addEventListener("pointerdown", function(e) {
  dragStartY = e.clientY;
  letterBox.setPointerCapture(e.pointerId);
});
letterBox.addEventListener("pointermove", function(e) {
  if (dragStartY === null) return;
  const step = 32;
  if (e.clientY - dragStartY > step) { changeLetter(1); dragStartY = e.clientY; }
  else if (e.clientY - dragStartY < -step) { changeLetter(-1); dragStartY = e.clientY; }
});
letterBox.addEventListener("pointerup", function() { dragStartY = null; });
letterBox.addEventListener("pointercancel", function() { dragStartY = null; });

render();
checkWord(false);
</script>

</body>
</html>
